<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <title>Bamazon</title>
  <style>
    .wordmark { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight: 700; }
    .tagline { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight: 400; }
  </style>

  <circle cx="150" cy="150" r="130" fill="#111827" />

  <text x="150" y="128" text-anchor="middle" fill="#ffffff" font-size="34" class="wordmark">
    Bamazon
  </text>

  <path
    d="M70 190 Q150 242 230 185"
    stroke="#f59e0b"
    stroke-width="8"
    fill="none"
    stroke-linecap="round"
  />

  <polygon points="220,180 245,190 220,200" fill="#f59e0b" />

  <text x="150" y="210" text-anchor="middle" fill="#9ca3af" font-size="11" class="tagline">
    questionable purchases, delivered
  </text>
</svg>
